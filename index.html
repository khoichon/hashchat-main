<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --surface: #111111;
      --border: #1f1f1f;
      --border-focus: #3a3a3a;
      --text: #e8e8e8;
      --text-dim: #555555;
      --text-muted: #333333;
      --accent: #ffffff;
      --error: #ff4444;
      --success: #44ff88;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 380px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0.6rem 1.2rem 0.8rem;
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 1px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab:hover { color: var(--text); }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* Form */
    .form { display: flex; flex-direction: column; gap: 1rem; }
    .form-panel { display: none; }
    .form-panel.active { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }

    input::placeholder { color: var(--text-muted); }

    input:focus {
      border-color: var(--border-focus);
      background: #141414;
    }

    input.error { border-color: var(--error); }

    /* Submit button */
    .btn {
      margin-top: 0.5rem;
      background: var(--accent);
      border: none;
      border-radius: 2px;
      color: #080808;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.85rem 1rem;
      transition: opacity 0.2s, transform 0.1s;
      width: 100%;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.99); }
    .btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    /* Status message */
    .status {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      min-height: 1.2rem;
      letter-spacing: 0.05em;
      margin-top: 0.25rem;
      transition: opacity 0.2s;
    }

    .status.error   { color: var(--error); }
    .status.success { color: var(--success); }
    .status.empty   { opacity: 0; }

    /* Footer hint */
    .hint {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-top: 2.5rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <div class="logo-dot"></div>
      chat
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="login">sign in</button>
      <button class="tab" data-tab="signup">sign up</button>
    </div>

    <!-- LOGIN -->
    <div class="form-panel active" id="panel-login">
      <div class="field">
        <label>email</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <div class="status empty" id="login-status"></div>
      <button class="btn" id="login-btn">sign in</button>
    </div>

    <!-- SIGNUP -->
    <div class="form-panel" id="panel-signup">
      <div class="field">
        <label>email</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="field">
        <label>password</label>
        <input type="password" id="signup-password" placeholder="min. 6 characters" autocomplete="new-password" />
      </div>
      <div class="status empty" id="signup-status"></div>
      <button class="btn" id="signup-btn">create account</button>
    </div>

    <p class="hint">// your hash is assigned on signup<br>// no display names. just you.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
