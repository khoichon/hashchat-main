<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #080808;
      --surface:      #0f0f0f;
      --surface-2:    #141414;
      --border:       #1a1a1a;
      --border-hover: #2a2a2a;
      --text:         #e8e8e8;
      --text-dim:     #505050;
      --text-muted:   #2a2a2a;
      --accent:       #ffffff;
      --error:        #ff4444;
      --success:      #44ff88;
      --sidebar-w:    240px;
      --header-h:     48px;
      --input-h:      56px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }

    /* ── Layout ── */
    .layout { display: flex; height: 100vh; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      height: var(--header-h);
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .sidebar-section {
      padding: 1rem 0;
      flex-shrink: 0;
    }

    .sidebar-section + .sidebar-section {
      border-top: 1px solid var(--border);
    }

    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 0 1rem 0.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-add {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1;
      transition: color 0.15s;
      background: none;
      border: none;
      padding: 0;
    }
    .section-add:hover { color: var(--accent); }

    .room-list { display: flex; flex-direction: column; }

    .room-item {
      padding: 0.45rem 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.82rem;
      color: var(--text-dim);
      transition: background 0.1s, color 0.1s;
      border-radius: 0;
      user-select: none;
    }

    .room-item:hover { background: var(--surface-2); color: var(--text); }

    .room-item.active {
      background: var(--surface-2);
      color: var(--accent);
    }

    .room-prefix {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .room-item.active .room-prefix { color: var(--text-dim); }

    .room-unread {
      margin-left: auto;
      background: var(--accent);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      font-weight: 500;
      border-radius: 2px;
      padding: 1px 4px;
      min-width: 16px;
      text-align: center;
    }

    /* Sidebar user footer */
    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .user-avatar {
      width: 26px; height: 26px;
      border-radius: 2px;
      flex-shrink: 0;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #080808;
      font-weight: 500;
    }

    .user-info { overflow: hidden; flex: 1; }

    .user-hash {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-status {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
    }

    .signout-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px;
      transition: color 0.15s;
      font-family: 'DM Mono', monospace;
      flex-shrink: 0;
    }
    .signout-btn:hover { color: var(--error); }

    /* ── Main chat area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .chat-header {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .chat-header-prefix {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .chat-header-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .chat-header-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: 0.5rem;
      padding-left: 0.75rem;
      border-left: 1px solid var(--border);
    }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 0 0.75rem;
      padding: 0.35rem 0;
      animation: msgIn 0.15s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Collapse repeated messages from same user */
    .msg.collapsed .msg-avatar { visibility: hidden; }
    .msg.collapsed .msg-meta   { display: none; }

    .msg-avatar {
      width: 26px; height: 26px;
      border-radius: 2px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #080808;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .msg-body { min-width: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.15rem;
    }

    .msg-name {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
    }

    .msg-time {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-dim);
    }

    .msg-text {
      font-size: 0.85rem;
      line-height: 1.55;
      color: var(--text);
      word-break: break-word;
    }

    .msg-reply {
      border-left: 2px solid var(--border-hover);
      padding: 0.25rem 0.6rem;
      margin-bottom: 0.3rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      gap: 0.4rem;
      text-align: center;
    }

    .empty-state-big {
      font-size: 1.8rem;
      opacity: 0.15;
    }

    /* No room selected */
    .no-room {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    /* ── Input area ── */
    .input-area {
      padding: 1rem 1.5rem 1.25rem;
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within { border-color: var(--border-hover); }

    /* Reply preview inside input */
    .reply-preview {
      display: none;
      padding: 0.5rem 1rem 0;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .reply-preview.visible {
      display: flex;
    }

    .reply-cancel {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      line-height: 1;
      padding: 0;
      transition: color 0.15s;
    }
    .reply-cancel:hover { color: var(--error); }

    .input-inner { display: flex; align-items: flex-end; gap: 0; flex: 1; }

    #msg-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      padding: 0.85rem 1rem;
      resize: none;
      min-height: var(--input-h);
      max-height: 160px;
      line-height: 1.5;
    }

    #msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      padding: 0 1rem;
      height: var(--input-h);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .send-btn:hover { color: var(--accent); background: var(--surface-2); }
    .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── Modal (create room / new DM) ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 1.5rem;
      width: 100%;
      max-width: 340px;
      transform: translateY(8px);
      transition: transform 0.2s;
    }

    .modal-overlay.visible .modal { transform: translateY(0); }

    .modal-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
    }

    .modal-field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }

    .modal-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .modal-input {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 0.65rem 0.85rem;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    .modal-input:focus { border-color: var(--border-hover); }
    .modal-input::placeholder { color: var(--text-muted); }

    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }

    .modal-btn {
      flex: 1;
      padding: 0.65rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .modal-btn.primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
    }

    .modal-btn.secondary {
      background: none;
      color: var(--text-dim);
    }

    .modal-btn.secondary:hover { background: var(--surface-2); color: var(--text); }

    .modal-status {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--error);
      min-height: 1rem;
      margin-top: 0.25rem;
    }

    /* ── Scrollbar for sidebar ── */
    .room-list::-webkit-scrollbar { width: 3px; }
    .room-list::-webkit-scrollbar-thumb { background: var(--border); }

    /* ── Loading overlay ── */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-dim);
      letter-spacing: 0.12em;
      transition: opacity 0.3s;
    }

    #loading.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">// initializing</div>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-dot"></div>
        chat
      </div>
    </div>

    <!-- Rooms -->
    <div class="sidebar-section">
      <div class="section-label">
        rooms
        <button class="section-add" id="new-room-btn" title="New room">+</button>
      </div>
      <div class="room-list" id="room-list"></div>
    </div>

    <!-- DMs -->
    <div class="sidebar-section">
      <div class="section-label">
        direct
        <button class="section-add" id="new-dm-btn" title="New DM">+</button>
      </div>
      <div class="room-list" id="dm-list"></div>
    </div>

    <!-- User footer -->
    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar"></div>
      <div class="user-info">
        <div class="user-hash" id="user-hash">—</div>
        <div class="user-status">online</div>
      </div>
      <button class="signout-btn" id="signout-btn" title="Sign out">out</button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <main class="main" id="main">
    <div class="no-room" id="no-room">// select a room</div>
  </main>

</div>

<!-- ── Create Room Modal ── -->
<div class="modal-overlay" id="room-modal">
  <div class="modal">
    <div class="modal-title">// new room</div>
    <div class="modal-field">
      <label class="modal-label">name</label>
      <input class="modal-input" id="room-name-input" placeholder="e.g. random" maxlength="32" />
    </div>
    <div class="modal-field">
      <label class="modal-label">description</label>
      <input class="modal-input" id="room-desc-input" placeholder="optional" maxlength="80" />
    </div>
    <div class="modal-status" id="room-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="room-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="room-modal-create">create</button>
    </div>
  </div>
</div>

<!-- ── New DM Modal ── -->
<div class="modal-overlay" id="dm-modal">
  <div class="modal">
    <div class="modal-title">// new direct message</div>
    <div class="modal-field">
      <label class="modal-label">hash (e.g. name#1234)</label>
      <input class="modal-input" id="dm-hash-input" placeholder="username#0000" />
    </div>
    <div class="modal-status" id="dm-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="dm-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="dm-modal-open">open</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
</body>
</html>
