<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #05080f;
      --glass:        rgba(255,255,255,0.03);
      --glass-hover:  rgba(255,255,255,0.055);
      --glass-active: rgba(255,255,255,0.07);
      --border:       rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.13);
      --text:         rgba(255,255,255,0.88);
      --text-dim:     rgba(255,255,255,0.35);
      --text-muted:   rgba(255,255,255,0.12);
      --accent:       #ffffff;
      --error:        #ff5555;
      --success:      #55ffaa;
      --sidebar-w:    256px;
      --header-h:     52px;
      --input-h:      52px;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-weight: 300;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(80,100,200,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(60,80,180,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .layout { display: flex; height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--glass);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      height: var(--header-h);
      padding: 0 1.1rem;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Geist Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.55rem;
      text-transform: uppercase;
    }

    .logo-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(255,255,255,0.7);
      animation: pulse 2.5s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 8px rgba(255,255,255,0.7); }
      50%      { opacity: 0.25; box-shadow: none; }
    }

    .sidebar-section { padding: 0.85rem 0; flex-shrink: 0; }
    .sidebar-section + .sidebar-section { border-top: 1px solid var(--border); }

    .section-label {
      font-family: 'Geist Mono', monospace;
      font-size: 0.57rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 1.1rem 0.55rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-add {
      cursor: pointer;
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1;
      transition: color 0.15s;
      background: none;
      border: none;
      padding: 0;
    }
    .section-add:hover { color: var(--accent); }

    .room-list { display: flex; flex-direction: column; gap: 1px; padding: 0 0.5rem; }

    .room-item {
      padding: 0.45rem 0.65rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      transition: background 0.15s, color 0.15s;
      border-radius: 6px;
      user-select: none;
    }
    .room-item:hover { background: var(--glass-hover); color: var(--text); }
    .room-item.active {
      background: var(--glass-active);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--border-hover);
    }

    .room-prefix {
      font-family: 'Geist Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .room-item.active .room-prefix { color: var(--text-dim); }

    .sidebar-footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 0.85rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-shrink: 0;
      background: rgba(255,255,255,0.015);
    }

    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 6px;
      flex-shrink: 0;
      font-family: 'Geist Mono', monospace;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #050810;
      font-weight: 500;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .user-info { overflow: hidden; flex: 1; }

    .user-name {
      font-size: 0.78rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 400;
    }

    .user-hash-small {
      font-family: 'Geist Mono', monospace;
      font-size: 0.57rem;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
      transition: color 0.15s;
    }
    .user-hash-small:hover { color: var(--accent); }

    .signout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.68rem;
      padding: 4px;
      transition: color 0.15s;
      font-family: 'Geist Mono', monospace;
      flex-shrink: 0;
    }
    .signout-btn:hover { color: var(--error); }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .chat-header {
      height: var(--header-h);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
      background: rgba(255,255,255,0.015);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .chat-header-prefix {
      font-family: 'Geist Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .chat-header-name {
      font-family: 'Geist Mono', monospace;
      font-size: 0.82rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .chat-header-desc {
      font-size: 0.72rem;
      color: var(--text-dim);
      margin-left: 0.3rem;
      padding-left: 0.75rem;
      border-left: 1px solid var(--border);
    }

    .invite-btn {
      margin-left: auto;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'Geist Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      padding: 0.3rem 0.7rem;
      transition: all 0.15s;
    }
    .invite-btn:hover { color: var(--accent); border-color: var(--border-hover); background: var(--glass-hover); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem 0.5rem;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0 0.8rem;
      padding: 0.28rem 0;
      animation: msgIn 0.18s ease both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.collapsed .msg-avatar { visibility: hidden; }
    .msg.collapsed .msg-meta   { display: none; }
    .msg.collapsed              { padding-top: 0.04rem; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 6px;
      font-family: 'Geist Mono', monospace;
      font-size: 0.57rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #050810;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .msg-body { min-width: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 0.4rem;
      margin-bottom: 0.15rem;
      flex-wrap: wrap;
    }

    .msg-name { font-size: 0.78rem; font-weight: 500; }

    .msg-hash-tag {
      font-family: 'Geist Mono', monospace;
      font-size: 0.6rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .msg-time {
      font-family: 'Geist Mono', monospace;
      font-size: 0.56rem;
      color: var(--text-muted);
      margin-left: 0.1rem;
    }

    .msg-text {
      font-size: 0.82rem;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    .msg-reply {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      border-left: 2px solid var(--border-hover);
      padding: 0.2rem 0.6rem;
      margin-bottom: 0.3rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: 'Geist Mono', monospace;
      border-radius: 0 4px 4px 0;
      background: rgba(255,255,255,0.02);
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      gap: 0.5rem;
    }
    .empty-state-big { font-size: 2rem; opacity: 0.08; }

    .no-room {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-family: 'Geist Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
    }

    /* ── Input ── */
    .input-area { padding: 0.85rem 1.5rem 1.1rem; flex-shrink: 0; }

    .input-wrap {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      transition: border-color 0.2s, box-shadow 0.2s;
      overflow: hidden;
    }
    .input-wrap:focus-within {
      border-color: var(--border-hover);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.04), 0 4px 24px rgba(0,0,0,0.3);
    }

    .reply-preview {
      display: none;
      padding: 0.5rem 1rem;
      font-family: 'Geist Mono', monospace;
      font-size: 0.63rem;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      background: rgba(255,255,255,0.02);
    }
    .reply-preview.visible { display: flex; }

    .reply-cancel {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 0.72rem; padding: 0; transition: color 0.15s;
    }
    .reply-cancel:hover { color: var(--error); }

    .input-inner { display: flex; align-items: flex-end; }

    #msg-input {
      flex: 1;
      background: none; border: none; outline: none;
      color: var(--text);
      font-family: 'Geist', sans-serif;
      font-size: 0.82rem; font-weight: 300;
      padding: 0.85rem 1rem;
      resize: none;
      min-height: var(--input-h); max-height: 160px;
      line-height: 1.55;
    }
    #msg-input::placeholder { color: var(--text-muted); }

    .send-btn {
      background: none; border: none;
      border-left: 1px solid var(--border);
      color: var(--text-dim); cursor: pointer;
      padding: 0 1.1rem; height: var(--input-h);
      font-family: 'Geist Mono', monospace;
      font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0; align-self: flex-end;
    }
    .send-btn:hover { color: var(--accent); background: rgba(255,255,255,0.04); }
    .send-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(5,8,15,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 100; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .modal-overlay.visible { opacity: 1; pointer-events: all; }

    .modal {
      background: rgba(10,13,22,0.92);
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid var(--border-hover);
      border-radius: 12px; padding: 1.5rem;
      width: 100%; max-width: 340px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03);
      transform: translateY(10px) scale(0.98); transition: transform 0.2s;
    }
    .modal-overlay.visible .modal { transform: translateY(0) scale(1); }

    .modal-title {
      font-family: 'Geist Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 1.25rem;
    }

    .modal-field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 0.85rem; }

    .modal-label {
      font-family: 'Geist Mono', monospace;
      font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-dim);
    }

    .modal-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-family: 'Geist Mono', monospace;
      font-size: 0.78rem; padding: 0.65rem 0.9rem;
      outline: none; transition: border-color 0.15s, background 0.15s; width: 100%;
    }
    .modal-input:focus { border-color: var(--border-hover); background: rgba(255,255,255,0.06); }
    .modal-input::placeholder { color: var(--text-muted); }

    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.1rem; }

    .modal-btn {
      flex: 1; padding: 0.65rem; border-radius: 7px;
      border: 1px solid var(--border);
      font-family: 'Geist Mono', monospace;
      font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; transition: all 0.15s;
    }
    .modal-btn.primary { background: rgba(255,255,255,0.92); color: var(--bg); border-color: transparent; }
    .modal-btn.primary:hover { background: #fff; }
    .modal-btn.secondary { background: none; color: var(--text-dim); }
    .modal-btn.secondary:hover { background: var(--glass-hover); color: var(--text); }

    .modal-status {
      font-family: 'Geist Mono', monospace;
      font-size: 0.63rem; color: var(--error); min-height: 1rem; margin-top: 0.15rem;
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; font-family: 'Geist Mono', monospace;
      font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.16em;
      transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    .back-btn { display: none; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      :root { --sidebar-w: 100vw; }
      .layout { position: relative; }
      .sidebar {
        position: fixed; inset: 0; width: 100vw; z-index: 50;
        transform: translateX(0); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      }
      .sidebar.hidden { transform: translateX(-100%); }
      .main {
        position: fixed; inset: 0; width: 100vw;
        transform: translateX(100%); transition: transform 0.28s cubic-bezier(.4,0,.2,1);
      }
      .main.visible { transform: translateX(0); }
      .back-btn {
        display: flex; align-items: center; background: none; border: none;
        color: var(--text-dim); cursor: pointer;
        font-family: 'Geist Mono', monospace; font-size: 0.68rem;
        letter-spacing: 0.06em; padding: 0; margin-right: 0.5rem;
        transition: color 0.15s; flex-shrink: 0;
      }
      .back-btn:hover { color: var(--accent); }
      #toast-container { left: 1rem; right: 1rem; bottom: 5rem; }
      .toast { width: 100%; }
      .room-item { padding: 0.65rem 0.65rem; }
    }
  </style>
</head>
<body>

<div id="loading">// initializing</div>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo"><div class="logo-dot"></div>chat</div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">
        rooms
        <button class="section-add" id="new-room-btn">+</button>
      </div>
      <div class="room-list" id="room-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="section-label">
        direct
        <button class="section-add" id="new-dm-btn">+</button>
      </div>
      <div class="room-list" id="dm-list"></div>
    </div>

    <div class="sidebar-footer">
      <div class="user-avatar" id="user-avatar"></div>
      <div class="user-info">
        <div class="user-name" id="user-name">—</div>
        <div class="user-hash-small" id="user-hash" title="click to copy">#—</div>
      </div>
      <button class="signout-btn" id="signout-btn">out</button>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="no-room">// select a room</div>
  </main>

</div>

<!-- Invite Modal -->
<div class="modal-overlay" id="invite-modal">
  <div class="modal">
    <div class="modal-title">// invite to room</div>
    <div class="modal-field">
      <label class="modal-label">hash (e.g. #deadbeef12)</label>
      <input class="modal-input" id="invite-hash-input" placeholder="#deadbeef12" />
    </div>
    <div class="modal-status" id="invite-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="invite-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="invite-modal-add">add</button>
    </div>
  </div>
</div>

<!-- Create Room Modal -->
<div class="modal-overlay" id="room-modal">
  <div class="modal">
    <div class="modal-title">// new room</div>
    <div class="modal-field">
      <label class="modal-label">name</label>
      <input class="modal-input" id="room-name-input" placeholder="e.g. random" maxlength="32" />
    </div>
    <div class="modal-field">
      <label class="modal-label">description</label>
      <input class="modal-input" id="room-desc-input" placeholder="optional" maxlength="80" />
    </div>
    <div class="modal-status" id="room-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="room-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="room-modal-create">create</button>
    </div>
  </div>
</div>

<!-- DM Modal -->
<div class="modal-overlay" id="dm-modal">
  <div class="modal">
    <div class="modal-title">// new direct message</div>
    <div class="modal-field">
      <label class="modal-label">hash (e.g. #deadbeef12)</label>
      <input class="modal-input" id="dm-hash-input" placeholder="#deadbeef12" />
    </div>
    <div class="modal-status" id="dm-modal-status"></div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="dm-modal-cancel">cancel</button>
      <button class="modal-btn primary" id="dm-modal-open">open</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="js/notifications.js"></script>
<script src="js/app.js"></script>
</body>
</html>
